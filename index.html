<body>
    <div class="container">
        <div class="header">
            <h1>RED FLAG Famille</h1>

                </div>

                <div id="resultsContainer">
                    <div style="text-align: center; color: #888780; font-size: 14px; margin-top: 40px; padding: 20px; border-top: 2px solid #e0dcd3;">
                        Complète d'abord le test gratuit pour voir ton premier résultat.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>

        // ===== PROTECTIONS LÉGÈRES GRATUIT =====
        // Décourage le partage/copier-coller basique du résultat gratuit.
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        });

        document.addEventListener('keydown', function(event) {
            const key = (event.key || '').toLowerCase();
            const blocked =
                key === 'f12' ||
                (event.ctrlKey && key === 'u') ||
                (event.ctrlKey && key === 's') ||
                (event.ctrlKey && key === 'p') ||
                (event.ctrlKey && event.shiftKey && ['i', 'j', 'c'].includes(key));

            if (blocked) {
                event.preventDefault();
                return false;
            }
        });

        // ===== CONFIGURATION =====
        const testCompletedKey = 'redFlagFamilleTestCompleted';
        const resultsKey = 'redFlagFamilleResults';
        
        // 20 questions comportementales (5 par catégorie)
        const allQuestions = {
            parentification: [
                { text: "Tu t'excuses même quand tu n'as rien fait.", value: 5 },
                { text: "Ton premier réflexe quand quelqu'un souffre c'est de le réconforter, même au détriment de toi.", value: 5 },
                { text: "Tu sais mieux écouter qu'être écoutée.", value: 4 },
                { text: "Tu culpabilises quand tu dis non, même pour des choses raisonnables.", value: 4 },
                { text: "Tu continues à prendre soin d'une personne de ta famille qui ne te l'a jamais demandé.", value: 5 }
            ],
            manipulation: [
                { text: "Tu réfléchis longtemps avant d'oser dire non.", value: 5 },
                { text: "Tu as du mal à exprimer tes besoins, même à tes proches.", value: 5 },
                { text: "Tu crois que si tu dis non, les gens vont t'en vouloir.", value: 4 },
                { text: "Tu remarques souvent que tu hoches la tête alors que tu voulais dire non.", value: 4 },
                { text: "Tu préfères te taire plutôt que de créer un conflit.", value: 5 }
            ],
            culpabilite: [
                { text: "Tu sens une responsabilité pour le bonheur de tes proches.", value: 5 },
                { text: "Tu te demandes souvent si tu as fait quelque chose de mal, même quand ce n'est pas ton problème.", value: 5 },
                { text: "Tu culpabilises juste d'avoir des besoins.", value: 4 },
                { text: "Tu crois que tu dois réparer les choses qui vont mal dans la famille.", value: 4 },
                { text: "Tu portes le poids émotionnel de ta famille sur tes épaules.", value: 5 }
            ],
            favoritisme: [
                { text: "Tu te compares souvent aux autres et tu sors perdante.", value: 5 },
                { text: "Tu cherches la validation extérieure pour te sentir bien.", value: 5 },
                { text: "Tu acceptes des choses inacceptables par peur d'être abandonnée.", value: 4 },
                { text: "Tu as le sentiment de devoir mériter l'amour des gens.", value: 4 },
                { text: "Tu sens que tu n'as jamais été assez pour quelqu'un d'important dans ta vie.", value: 5 }
            ]
        };

        // ===== CONTENU PERSONNALISÉ - 8 BLOCS PAR PROFIL =====
        const personnalizedContent = {
            parentification: {
                name: "L'Enfant Parent",
                blocks: {
                    synthese: {
                        title: "🧩 Ta synthèse personnalisée",
                        content: `Tu as grandi en prenant soin des autres. C'était ta responsabilité bien avant que ce soit ton choix.

Aujourd'hui encore, tu fais passer les besoins des autres avant les tiens — pas par gentillesse, mais par automatisme. Tu anticipes leurs problèmes, tu arranges les choses avant même qu'on te le demande, tu cherches à maintenir la paix à n'importe quel prix.

Ce n'est pas ton caractère. C'est un rôle que tu as appris très tôt, et tu l'as joué pendant tellement longtemps qu'il est devenu invisible.`
                    },
                    erreurs: {
                        title: "⚠️ Tes erreurs invisibles",
                        content: `• Tu demandes rarement de l'aide — ça n'a jamais été une option pour toi.
• Tu minimises ce que tu ressens au profit de ce que ressentent les autres.
• Tu pardonnes trop rapidement, même quand ce n'était pas à toi de pardonner.
• Tu confonds responsabilité personnelle et culpabilité transgénérationnelle.
• Tu crois que si quelque chose va mal, c'est à toi de le réparer.`
                    },
                    consequences: {
                        title: "📉 Ce que ce rôle te coûte aujourd'hui",
                        content: `Tu attires des personnes qui prennent sans retour — des gens habitués à quelqu'un qui se sacrifie pour eux.

Tu te demandes pourquoi tu te sens vidée après chaque relation, comme si tu avais vidé un puits sans jamais le remplir.

Ton corps accumule la fatigue émotionnelle que tu refuses d'écouter. Les douleurs — au dos, aux épaules, au cou — sont souvent l'expression de ce poids que tu continues à porter.

Tu risques de finir isolée, pas parce que tu n'as pas d'amis, mais parce que tu as oublié comment recevoir.`
                    },
                    forces: {
                        title: "💚 Tes forces cachées",
                        content: `• Tu sais vraiment écouter. Pas le faux "écouter" — tu entends ce que les gens ne disent pas.
• Tu vois la souffrance des autres avant même qu'ils la nomment.
• Tu es capable de te reconstruire après des périodes impossibles.
• Tu possèdes une empathie intelligente — celle qui crée des liens réels.
• Quand tu retrouves ta place, tu deviens quelqu'un d'extrêmement stable pour ceux qui en ont vraiment besoin.`
                    },
                    reproduction: {
                        title: "🔄 Ce que tu reproduis dans tes relations amoureuses",
                        content: `Tu cherches quelqu'un à "réparer" ou à "aider" — pas consciemment, mais c'est le seul pattern que tu connais pour créer du lien.

Quand un partenaire est stable et heureux, tu te sens inutile. Donc tu crées de petits problèmes, ou tu attires quelqu'un de blessé pour avoir un rôle.

Tu acceptes des choses inacceptables parce que tu crois que c'est ça, l'amour : se sacrifier.

Tes relations deviennent transactionnelles : tu donnes, donc tu mérites qu'on t'aime. Pas à de l'amour vrai.`
                    },
                    planAction: {
                        title: "🎯 Ton plan d'action sur 30 jours",
                        content: `<strong>Semaine 1 :</strong> Observe toutes les fois où tu t'occupes de quelque chose qui ne t'appartient pas. Juste observe. Ne change rien encore.

<strong>Semaine 2 :</strong> Commence à dire "Je vais vérifier si c'est vraiment mon problème" avant de sauter à la résolution.

<strong>Semaine 3 :</strong> Demande une seule chose pour toi chaque jour — quelque chose de simple. Un café, une heure seule, un non sans explication.

<strong>Semaine 4 :</strong> Regarde ce qui change dans tes relations quand tu arrêtes de gérer les émotions des autres.`
                    },
                    corpsExprime: {
                        title: "💫 Ce que ton corps exprime souvent dans ce type de fonctionnement",
                        content: `Quand tu as longtemps pris la place de celle qui gère, rassure, organise et protège, ton corps finit rarement neutre.

Chez beaucoup de personnes ayant ce fonctionnement, les épaules se chargent d'une tension chronique — comme si elles portaient un poids invisible. La mâchoire se contracte, le ventre reste en vigilance, comme si une partie devait rester disponible en permanence.

Il est fréquent d'observer un sommeil léger, fragmenté, avec des réveils nocturnes. Au réveil après 8 heures, la fatigue persiste, parce que le système nerveux n'a jamais vraiment relâché.

Il y a aussi cette sensation de boule dans la poitrine, cet essoufflement quand quelqu'un te demande quelque chose, cette fatigue émotionnelle qui s'accumule silencieusement.

Tout ça, c'est ton corps qui parle. Et personne ne t'a jamais appris à l'écouter.`
                    }
                }
            },
            manipulation: {
                name: "La Victime Silencieuse",
                blocks: {
                    synthese: {
                        title: "🧩 Ta synthèse personnalisée",
                        content: `Tu as appris très tôt qu'il y avait un prix à dire les choses. Peut-être qu'on t'ignorait, peut-être qu'on t'en voulait, ou pire — peut-être qu'on t'utilisait tes paroles contre toi.

Du coup tu t'es tue. Tu as observé plutôt que de parler. Tu as accepté plutôt que de contredire.

Aujourd'hui, tu doutes encore de ton droit à la parole. Tu te demandes si ce que tu penses est important. Tu crois que si tu dis non, tu risques de tout perdre.

Ce silence n'est pas ta nature. C'est une protection qu'on t'a appris à construire.`
                    },
                    erreurs: {
                        title: "⚠️ Tes erreurs invisibles",
                        content: `• Tu préfères te taire plutôt que de risquer un conflit, même petit.
• Tu accumules de la frustration parce que les autres ne savent pas ce qui se passe en toi.
• Tu hoches la tête quand tu veux dire non.
• Tu crois que ta voix n'a pas de valeur si elle n'arrange personne.
• Tu penses que pour être aimée, tu dois être facile — donc tu deviens invisible.`
                    },
                    consequences: {
                        title: "📉 Ce que ce rôle te coûte aujourd'hui",
                        content: `Les autres pensent que tout va bien chez toi parce que tu ne dis jamais que ça va mal.

Tu accumules de la frustration qui finit par exploser dans des moments inappropriés — pas sur le vrai problème, mais sur quelque chose sans importance.

Tes relations se construisent sur du non-dit. Les gens se demandent ce que tu penses vraiment, parce que tu ne t'es jamais montrée.

Et quand quelqu'un te quitte, tu réalises qu'il ne t'a jamais vraiment connue — parce que tu ne t'es jamais vraiment dévoilée.

Ton corps exprime ce silence. Et personne ne t'a jamais entendue pleurer en silence.`
                    },
                    forces: {
                        title: "💚 Tes forces cachées",
                        content: `• Tu observes finement les comportements — tu sais lire les gens mieux que quiconque.
• Tu écoutes vraiment, sans chercher à corriger ou à juger.
• Tu es loyale envers les gens qui te font confiance.
• Tu as une intelligence émotionnelle fine — tu sens les non-dits.
• Quand tu trouves ta voix, elle porte une authenticité que peu de gens possèdent.`
                    },
                    reproduction: {
                        title: "🔄 Ce que tu reproduis dans tes relations amoureuses",
                        content: `Tu cherches quelqu'un de dominant — quelqu'un qui parle pour deux. Ça te soulage de ne pas avoir à dire ce que tu penses.

Mais rapidement, tu te sens diminuée. Ton partenaire pense qu'il te connaît, mais il ne connaît qu'une version domestiquée de toi.

Quand tu lèves la voix une seule fois, c'est un choc pour lui. Parce que tu n'as jamais exprimé tes besoins avant.

Tes relations ressemblent à un vide — pas par manque d'amour, mais par manque de vraie communication. Et le silence finit par tuer même les plus beaux amours.`
                    },
                    planAction: {
                        title: "🎯 Ton plan d'action sur 30 jours",
                        content: `<strong>Semaine 1 :</strong> Observe chaque fois que tu dis oui alors que tu voulais dire non. Juste remarque-le.

<strong>Semaine 2 :</strong> Exprime un petit désaccord — quelque chose de simple — sans te justifier. "Je ne suis pas d'accord" c'est suffisant.

<strong>Semaine 3 :</strong> Partage une pensée, une opinion, une envie que tu as gardée pour toi. Juste une.

<strong>Semaine 4 :</strong> Regarde comment les gens réagissent quand tu commences à être vraie.`
                    },
                    corpsExprime: {
                        title: "💫 Ce que ton corps exprime souvent dans ce type de fonctionnement",
                        content: `Quand tu as longtemps avalé tes paroles, ton corps finit par le payer.

Et puis il y a ce sentiment de suffocation émotionnelle — pas physique, mais réel. Comme si tu t'étouffais en silence.

Il est courant d'observer un sommeil perturbé par cette frustration non exprimée — des cauchemars, des réveils soudains, une sensation de ne jamais vraiment te reposer.

Tout ça, c'est ton corps qui crie ce que ta bouche refuse de dire.`
                    }
                }
            },
            culpabilite: {
                name: "La Responsable de Tout",
                blocks: {
                    synthese: {
                        title: "🧩 Ta synthèse personnalisée",
                        content: `Tu portes le poids invisible de ta famille sur tes épaules. Pas littéralement — mais émotionnellement, c'est comme si tout te revenait.

Tu crois que si quelque chose va mal chez quelqu'un d'autre, c'est parce que tu n'as pas pu l'empêcher. Tu culpabilises de choses qui ne dépendent absolument pas de toi.

Et le pire ? Tu crois que c'est normal. Que c'est comme ça que fonctionne l'amour.

Ce n'est pas normal. C'est un fonctionnement transgénérationnel — tu as hérité de la culpabilité de ta mère, ou de ta grand-mère. Et maintenant tu la transmets.`
                    },
                    erreurs: {
                        title: "⚠️ Tes erreurs invisibles",
                        content: `• Tu crois que tu es responsable du bonheur des autres.
• Tu confonds empathie et responsabilité — tu penses que parce que tu comprends quelqu'un, tu dois le sauver.
• Tu culpabilises juste d'exister, juste d'avoir tes besoins.
• Tu cherches à compenser des choses que tu n'as pas causées.
• Tu te dis "c'est de ma faute" même pour des problèmes qui étaient là avant ta naissance.`
